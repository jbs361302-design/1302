<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>1302 이서윤 우리동네 실시간 미세먼지</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0e1a;
      --panel: #111827;
      --border: #1e2d45;
      --accent: #00d4ff;
      --accent2: #00ff9d;
      --warn: #ffaa00;
      --danger: #ff4444;
      --text: #e2eaf8;
      --muted: #5a7090;
      --good: #00ff9d;
      --moderate: #ffee00;
      --bad: #ff7700;
      --verybad: #ff2222;
      --hazard: #9900cc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -30%;
      left: -10%;
      width: 60%;
      height: 60%;
      background: radial-gradient(ellipse, rgba(0,212,255,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,14,26,0.9);
      backdrop-filter: blur(10px);
    }

    .header-badge {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .student-id {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent);
      background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.25);
      padding: 6px 14px;
      border-radius: 4px;
    }

    .site-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.5px;
    }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--accent2);
      font-weight: 600;
      letter-spacing: 1px;
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      background: var(--accent2);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── MAIN ── */
    main {
      position: relative;
      z-index: 5;
      max-width: 1000px;
      margin: 0 auto;
      padding: 32px 24px 60px;
    }

    /* Search bar */
    .search-section {
      margin-bottom: 32px;
    }

    .search-label {
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .search-row {
      display: flex;
      gap: 10px;
    }

    .search-input {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 15px;
      padding: 13px 18px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus {
      border-color: var(--accent);
    }

    .search-input::placeholder { color: var(--muted); }

    .btn {
      background: var(--accent);
      color: #000;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      font-weight: 700;
      border: none;
      padding: 13px 24px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:hover { background: #33deff; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { background: var(--muted); cursor: not-allowed; }

    /* ── STATUS CARD ── */
    .status-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 28px 32px;
      margin-bottom: 24px;
      display: none;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    .status-card.visible { display: block; }

    .station-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .station-name {
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
    }

    .timestamp {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    /* ── GAUGE GRID ── */
    .gauges {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }

    .gauge-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .gauge-label {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .gauge-value {
      font-family: 'Orbitron', monospace;
      font-size: 36px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 4px;
    }

    .gauge-unit {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .gauge-status {
      font-size: 13px;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 20px;
      display: inline-block;
    }

    /* color by grade */
    .grade-1 { color: var(--good); border-color: var(--good); }
    .grade-2 { color: var(--moderate); border-color: var(--moderate); }
    .grade-3 { color: var(--bad); border-color: var(--bad); }
    .grade-4 { color: var(--verybad); border-color: var(--verybad); }
    .grade-5 { color: var(--hazard); border-color: var(--hazard); }

    .gauge-status.grade-1 { background: rgba(0,255,157,0.12); }
    .gauge-status.grade-2 { background: rgba(255,238,0,0.12); }
    .gauge-status.grade-3 { background: rgba(255,119,0,0.12); }
    .gauge-status.grade-4 { background: rgba(255,34,34,0.12); }
    .gauge-status.grade-5 { background: rgba(153,0,204,0.12); }

    .gauge-card.grade-1 { border-color: rgba(0,255,157,0.3); }
    .gauge-card.grade-2 { border-color: rgba(255,238,0,0.3); }
    .gauge-card.grade-3 { border-color: rgba(255,119,0,0.3); }
    .gauge-card.grade-4 { border-color: rgba(255,34,34,0.3); }
    .gauge-card.grade-5 { border-color: rgba(153,0,204,0.3); }

    /* ── EXTRA INFO ── */
    .extra-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .extra-item {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .extra-item-label {
      font-size: 10px;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .extra-item-value {
      font-family: 'Orbitron', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
    }

    /* ── ERROR / LOADING ── */
    .message-box {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      display: none;
    }

    .message-box.visible { display: block; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 24px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<header>
  <div class="header-badge">
    <span class="student-id">1302</span>
    <span class="site-title">이서윤 &nbsp;·&nbsp; 우리동네 실시간 미세먼지</span>
  </div>
  <div class="live-indicator">
    <span class="pulse-dot"></span>
    LIVE
  </div>
</header>

<main>
  <div class="search-section">
    <div class="search-label">측정소 검색</div>
    <div class="search-row">
      <input
        type="text"
        id="stationInput"
        class="search-input"
        placeholder="측정소 이름 입력 (예: 종로구, 강남구, 수원)"
        value="종로구"
      />
      <button class="btn" id="searchBtn" onclick="fetchData()">조회</button>
    </div>
  </div>

  <!-- Loading -->
  <div class="message-box" id="loadingBox">
    <div class="spinner"></div>
    <div>데이터를 불러오는 중...</div>
  </div>

  <!-- Error -->
  <div class="message-box" id="errorBox">
    <div style="font-size:28px; margin-bottom:12px;">⚠</div>
    <div id="errorMsg">오류가 발생했습니다.</div>
  </div>

  <!-- Result -->
  <div class="status-card" id="resultCard">
    <div class="station-header">
      <div class="station-name" id="stationName">—</div>
      <div class="timestamp" id="dataTime">—</div>
    </div>
    <div class="gauges">
      <div class="gauge-card" id="pm10Card">
        <div class="gauge-label">미세먼지 PM10</div>
        <div class="gauge-value" id="pm10Value">—</div>
        <div class="gauge-unit">㎍/㎥</div>
        <span class="gauge-status" id="pm10Grade">—</span>
      </div>
      <div class="gauge-card" id="pm25Card">
        <div class="gauge-label">초미세먼지 PM2.5</div>
        <div class="gauge-value" id="pm25Value">—</div>
        <div class="gauge-unit">㎍/㎥</div>
        <span class="gauge-status" id="pm25Grade">—</span>
      </div>
    </div>
    <div class="extra-grid">
      <div class="extra-item">
        <span class="extra-item-label">오존 O₃</span>
        <span class="extra-item-value" id="o3Value">—</span>
      </div>
      <div class="extra-item">
        <span class="extra-item-label">이산화질소 NO₂</span>
        <span class="extra-item-value" id="no2Value">—</span>
      </div>
      <div class="extra-item">
        <span class="extra-item-label">일산화탄소 CO</span>
        <span class="extra-item-value" id="coValue">—</span>
      </div>
      <div class="extra-item">
        <span class="extra-item-label">아황산가스 SO₂</span>
        <span class="extra-item-value" id="so2Value">—</span>
      </div>
    </div>
  </div>
</main>

<footer>
  공공데이터포털 에어코리아 API · 1302 이서윤 · 정보 수행평가 2026
</footer>

<script>
  const API_KEY = 'f09738c93e833184289bfd9ab90d154cbe9c243c652155cee6a586587b49d846';

  const gradeLabel = {
    '1': '좋음', '2': '보통', '3': '나쁨', '4': '매우나쁨', '5': '위험'
  };

  function show(id) { document.getElementById(id).classList.add('visible'); }
  function hide(id) { document.getElementById(id).classList.remove('visible'); }

  function applyGrade(cardId, valueId, gradeId, value, grade) {
    const card = document.getElementById(cardId);
    const val  = document.getElementById(valueId);
    const gr   = document.getElementById(gradeId);
    card.className = 'gauge-card';
    gr.className   = 'gauge-status';
    val.className  = 'gauge-value';
    val.textContent = value ?? '—';
    if (grade && gradeLabel[grade]) {
      const cls = 'grade-' + grade;
      card.classList.add(cls);
      gr.classList.add(cls);
      val.classList.add(cls);
      gr.textContent = gradeLabel[grade];
    } else {
      gr.textContent = '—';
    }
  }

  // JSONP 방식으로 CORS 우회
  function fetchData() {
    const station = document.getElementById('stationInput').value.trim();
    if (!station) { alert('측정소 이름을 입력하세요.'); return; }

    hide('resultCard');
    hide('errorBox');
    show('loadingBox');
    document.getElementById('searchBtn').disabled = true;

    // 기존 JSONP 스크립트 태그 제거
    const old = document.getElementById('jsonp-script');
    if (old) old.remove();
    if (window.__airCallback) delete window.__airCallback;

    // 타임아웃 처리
    const timer = setTimeout(() => {
      hide('loadingBox');
      document.getElementById('errorMsg').textContent = '요청 시간이 초과됐어요. 다시 시도해 주세요.';
      show('errorBox');
      document.getElementById('searchBtn').disabled = false;
    }, 10000);

    // 콜백 함수 등록
    window.__airCallback = function(json) {
      clearTimeout(timer);
      document.getElementById('searchBtn').disabled = false;
      hide('loadingBox');

      try {
        const items = json?.response?.body?.items;
        if (!items || items.length === 0) {
          document.getElementById('errorMsg').textContent = '해당 측정소를 찾을 수 없어요. 다른 이름을 입력해 보세요.';
          show('errorBox');
          return;
        }
        const d = items[0];
        document.getElementById('stationName').textContent = station + ' 측정소';
        document.getElementById('dataTime').textContent = '측정시각: ' + (d.dataTime ?? '—');
        applyGrade('pm10Card', 'pm10Value', 'pm10Grade', d.pm10Value, d.pm10Grade);
        applyGrade('pm25Card', 'pm25Value', 'pm25Grade', d.pm25Value, d.pm25Grade);
        document.getElementById('o3Value').textContent  = d.o3Value  ?? '—';
        document.getElementById('no2Value').textContent = d.no2Value ?? '—';
        document.getElementById('coValue').textContent  = d.coValue  ?? '—';
        document.getElementById('so2Value').textContent = d.so2Value ?? '—';
        show('resultCard');
      } catch(e) {
        document.getElementById('errorMsg').textContent = '데이터 파싱 오류: ' + e.message;
        show('errorBox');
      }
    };

    // JSONP 스크립트 삽입
    const script = document.createElement('script');
    script.id = 'jsonp-script';
    script.src =
      'https://apis.data.go.kr/B552584/ArpltnInforInqireSvc/getMsrstnAcctoRltmMesureDnsty'
      + '?serviceKey=' + encodeURIComponent(API_KEY)
      + '&callback=__airCallback'
      + '&returnType=json'
      + '&numOfRows=1'
      + '&pageNo=1'
      + '&stationName=' + encodeURIComponent(station)
      + '&dataTerm=DAILY'
      + '&ver=1.3';
    script.onerror = () => {
      clearTimeout(timer);
      hide('loadingBox');
      document.getElementById('errorMsg').textContent = 'API 호출에 실패했어요. API 키를 확인해 주세요.';
      show('errorBox');
      document.getElementById('searchBtn').disabled = false;
    };
    document.body.appendChild(script);
  }

  document.getElementById('stationInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchData();
  });

  window.addEventListener('load', fetchData);
</script>
</body>
</html>
